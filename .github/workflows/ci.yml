name: CI

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["develop", "main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.1.0 pytest==8.4
      - name: Lint with ruff
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]
      - name: Run tests
        run: pytest -q

  build-and-artifacts:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build tools
        run: |
          pip install --upgrade pip
          pip install build twine
      - name: Build wheel
        run: python -m build --wheel --outdir dist
      - name: Build Docker image
        run: |
          IMAGE_TAG="${{ github.sha }}"
          docker build -t ticmymail:${IMAGE_TAG} .
      - name: Generate SBOM (placeholder)
        run: |
          echo "SBOM placeholder file" > sbom.txt
      - name: Sign image (placeholder)
        run: |
          echo "image signature placeholder" > signature.txt
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ticmymail-ci-artifacts
          path: |
            dist/*.whl
            sbom.txt
            signature.txt
