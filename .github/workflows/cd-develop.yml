name: CD Develop

on:
  push:
    branches: ["develop"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: |
          IMAGE_TAG="develop-${{ github.sha }}"
          docker build -t ticmymail:${IMAGE_TAG} .
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
      - name: Login to ACR (placeholder)
        run: |
          echo "Sign in to ACR placeholder"
      - name: Push image to ACR (placeholder)
        run: |
          echo "docker push ticmymail:${IMAGE_TAG} (placeholder)"

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to AKS dev namespace (placeholder)
        run: |
          echo "kubectl apply -f manifests/dev --namespace=dev (placeholder)"
      - name: Verify deployment (placeholder)
        run: |
          echo "kubectl rollout status deployment/ticmymail -n dev (placeholder)"
